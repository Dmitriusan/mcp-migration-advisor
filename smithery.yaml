name: mcp-migration-advisor
displayName: Flyway & Liquibase Migration Advisor
description: Connects Claude Code and Cursor to your Flyway and Liquibase migrations for risk analysis, lock detection, conflict resolution, and rollback generation
version: 0.2.3
license: MIT
homepage: https://github.com/Dmitriusan/mcp-migration-advisor
npm: mcp-migration-advisor
categories:
  - developer-tools
  - databases
keywords:
  - migration
  - database-migration
  - flyway
  - liquibase
  - risk-analysis
  - schema
tools:
  - name: analyze_migration
    description: Detect lock risks and data loss patterns in a Flyway SQL migration file
  - name: analyze_liquibase
    description: Parse and risk-score a Liquibase XML changelog
  - name: analyze_liquibase_yaml
    description: Parse and risk-score a Liquibase YAML changelog
  - name: score_risk
    description: Return a numeric risk score (0–100) with per-operation breakdown
  - name: generate_rollback
    description: Generate reverse DDL rollback script for a migration
  - name: detect_conflicts
    description: Detect conflicts between two migration files (ordering, column overlap)
transport:
  - stdio
